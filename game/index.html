<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game">
      <h1 class="game__title">Enter your time</h1>
      <input type="number" class="game__input" placeholder="Input your time" />
      <a href="#http://google.ru" class="game__btn">Start</a>
      <h2><span class="game__time">00:00</span></h2>
      <span class="page">Enter a number of at least five</span>
      <div class="gameBox"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
